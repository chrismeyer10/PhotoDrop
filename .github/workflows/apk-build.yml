name: APK Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Debug APK bauen
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK (API 36) einrichten
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '13114758'
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Gradle-Cache einrichten
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle/wrapper/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: local.properties erstellen
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Debug APK bauen
        run: ./gradlew assembleDebug --no-daemon

      - name: APK als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: PhotoDrop-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
